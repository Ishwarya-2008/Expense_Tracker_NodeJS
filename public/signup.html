<!DOCTYPE html>
<html>

<head>
    <title>Sign Up</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">
    <main class="auth-shell solo">
        <section class="auth-card">
            <div class="auth-card-header">
                <p class="eyebrow">Expense Tracker</p>
                <h2>Sign Up</h2>
                <p>Set up a profile to start tracking your spending in one place.</p>
            </div>

            <p id="authStatus" class="status-text auth-inline-status" aria-live="polite"></p>

            <label class="field">
                <span>Name</span>
                <input id="name" placeholder="Your name">
            </label>

            <label class="field">
                <span>Email</span>
                <input id="email" type="email" placeholder="name@example.com">
            </label>

            <label class="field">
                <span>Password</span>
                <input id="password" type="password" placeholder="Create password">
            </label>

            <button class="primary-button" onclick="signup()" type="button">Create Account</button>

            <p class="auth-switch">Already have an account?
                <a href="login.html">Login</a>
            </p>
        </section>
    </main>

    <script>
        function setStatus(message) {
            const status = document.getElementById("authStatus");
            status.textContent = message || "";
        }

        function signup() {
            let name = document.getElementById("name");
            let email = document.getElementById("email");
            let password = document.getElementById("password");

            setStatus("Creating account...");

            fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: name.value,
                    email: email.value,
                    password: password.value
                })
            })
                .then(async res => {
                    const data = await res.json().catch(() => ({ msg: "Signup failed" }));
                    if (!res.ok) {
                        throw new Error(data.msg || "Signup failed");
                    }
                    return data;
                })
                .then(data => {
                    if (data.msg.includes("success")) {
                        setStatus("Account created. Redirecting to login...");
                        window.location.href = "login.html";
                    } else {
                        setStatus(data.msg || "Signup failed");
                    }
                })
                .catch(err => {
                    setStatus(err.message || "Signup failed");
                });
        }

        document.addEventListener("keydown", event => {
            if (event.key === "Enter") {
                signup();
            }
        });
    </script>

</body>

</html>
