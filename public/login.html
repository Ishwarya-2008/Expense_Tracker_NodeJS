<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">
    <main class="auth-shell solo">
        <section class="auth-card">
            <div class="auth-card-header">
                <p class="eyebrow">Expense Tracker</p>
                <h2>Login</h2>
                <p>Use your registered email and password to continue.</p>
            </div>

            <p id="authStatus" class="status-text auth-inline-status" aria-live="polite"></p>

            <label class="field">
                <span>Email</span>
                <input id="email" type="email" placeholder="name@example.com">
            </label>

            <label class="field">
                <span>Password</span>
                <input id="password" type="password" placeholder="Enter password">
            </label>

            <button class="primary-button" onclick="login()" type="button">Login</button>

            <p class="auth-switch">Don't have an account?
                <a href="signup.html">Sign up</a>
            </p>
        </section>
    </main>

    <script>
        function setStatus(message) {
            const status = document.getElementById("authStatus");
            status.textContent = message || "";
        }

        function login() {
            let email = document.getElementById("email");
            let password = document.getElementById("password");

            setStatus("Checking credentials...");

            fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: email.value,
                    password: password.value
                })
            })
                .then(async res => {
                    const data = await res.json().catch(() => ({ msg: "Login failed" }));
                    if (!res.ok) {
                        throw new Error(data.msg || "Login failed");
                    }
                    return data;
                })
                .then(data => {
                    if (data.token) {
                        localStorage.setItem("token", data.token);
                        window.location.href = "index.html";
                    } else {
                        setStatus(data.msg || "Login failed");
                    }
                })
                .catch(err => {
                    setStatus(err.message || "Login failed");
                });
        }

        document.addEventListener("keydown", event => {
            if (event.key === "Enter") {
                login();
            }
        });
    </script>

</body>

</html>
