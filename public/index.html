<!DOCTYPE html>
<html>

<head>
    <title>Expense Tracker</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-page">
    <main class="dashboard-shell">
        <section class="dashboard-hero">
            <article class="panel composer-panel">
                <div class="panel-header">
                    <div>
                        <p class="eyebrow">Expense composer</p>
                        <h3 id="formHeading">Add a new expense</h3>
                    </div>
                    <button id="logoutButton" class="ghost-button" type="button">Logout</button>
                </div>

                <div class="form-grid">
                    <label class="field">
                        <span>Expense title</span>
                        <input id="title" placeholder="Groceries, fuel, internet bill">
                    </label>

                    <label class="field">
                        <span>Amount</span>
                        <input id="amount" type="number" min="0" step="0.01" placeholder="0.00">
                    </label>
                </div>

                <input type="hidden" id="editId">

                <div class="action-row">
                    <button id="saveButton" class="primary-button" type="button">Save Expense</button>
                    <button id="cancelEditButton" class="secondary-button hidden" type="button">Cancel Edit</button>
                </div>

                <p id="appStatus" class="status-text" aria-live="polite"></p>
            </article>

            <div class="hero-total-card">
                <span class="stat-label">Total spent</span>
                <h2>Rs.<span id="total">0</span></h2>
                <p id="summaryDate">Updated just now</p>
            </div>
        </section>

        <section class="panel list-panel">
            <div class="panel-header compact">
                <div>
                    <p class="eyebrow">Recent activity</p>
                    <h3>Your expenses</h3>
                </div>
            </div>

            <div id="emptyState" class="empty-state">
                <h4>No expenses yet</h4>
                <p>Start by adding your first expense. It will appear here.</p>
            </div>

            <ul id="list" class="expense-list"></ul>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>

</body>

</html>
